<!DOCTYPE html>
<html>

<head>
<title>Banana Puzzle</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="title-box">
<img src="logo.png">
<h1>Mr. Banana</h1>
</div>

<h2 class="titleHighlight">Banana Arithmetic Challenge 🍌 </h2>
<br>
<br>
<div id="timer" class="timerHighlight"></div>

<div id="puzzleArea"></div>

<input type="number" id="answer" class="answerBox" placeholder="Enter your answer">

<br><br>

<button onclick="checkAnswer()">Submit</button>
<button class="backBtn" onclick="goBack()">Back</button>

<br><br>

<button class="scoreButton">Score: <span id="bananaScore">0</span></button>

<p id="message"></p>

<div class="logoutBox">
<button class="logout" onclick="logout()">Logout</button>
</div>

<script>

let solution=0
let score=0
let time=60

let level=localStorage.getItem("bananaLevel")

if(level=="easy") time=100
if(level=="intermediate") time=75
if(level=="hard") time=50

document.getElementById("timer").innerText="Time: "+time+"s"

let timer=setInterval(()=>{

time--

document.getElementById("timer").innerText="Time: "+time+"s"

if(time<=0){

clearInterval(timer)

saveScore()

Swal.fire({

title:"⏰ Time Up!",
html:"Your Score: "+score,
showCancelButton:true,
confirmButtonText:"Leaderboard",
cancelButtonText:"Back",
confirmButtonColor:"#e91e63",
cancelButtonColor:"#1976d2"

}).then((result)=>{

if(result.isConfirmed){
window.location="leaderboard.html"
}else{
window.location="game.html"
}

})

}

},1000)

function loadPuzzle(){

fetch("https://marcconrad.com/uob/banana/api.php")
.then(res=>res.json())

.then(data=>{

solution=data.solution

document.getElementById("puzzleArea").innerHTML=
`<img src="${data.question}" width="380">`

})

}

function checkAnswer(){

let user=document.getElementById("answer").value

if(user==solution){

score+=10

document.getElementById("bananaScore").innerText=score

document.getElementById("message").innerHTML="<span class='correctMsg'>✔ Correct</span>"

document.getElementById("answer").value=""

setTimeout(loadPuzzle,600)

}else{

document.getElementById("message").innerHTML="<span class='wrongMsg'>✖ Try Again</span>"

document.getElementById("answer").value=""

}

}

function saveScore(){

let player=localStorage.getItem("currentPlayer")
let flipScore=localStorage.getItem("flipScore")

let leaderboard=JSON.parse(localStorage.getItem("leaderboard")) || []

leaderboard.push({
name:player,
flip:Number(flipScore),
banana:Number(score)
})

localStorage.setItem("leaderboard",JSON.stringify(leaderboard))

}

function goBack(){
window.location="game.html"
}

function logout(){
window.location="index.html"
}

loadPuzzle()

</script>

</body>
</html>
