<!DOCTYPE html>
<html>
<head>
<title>Memory Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="title-box">
<img src="logo.png">
<h1>Mr. Banana</h1>
</div>

<h2 id="welcomeText" class="welcome"></h2>

<div class="level-box" id="levelBox">

<h2 class="levelTitleHighlight">Choose Your Level</h2>

<button class="levelBtn" onclick="startGame('easy')">Easy</button>
<button class="levelBtn" onclick="startGame('intermediate')">Intermediate</button>
<button class="levelBtn" onclick="startGame('hard')">Hard</button>

<button class="continueBtn" onclick="window.location.href='leaderboard.html'">
Leaderboard
</button>

</div>

<div class="logoutBox">
<button class="logout" onclick="logout()">Logout</button>
</div>

<h2 id="levelTitle" class="levelTitleHighlight"></h2>

<div id="gameBoard"></div>

<button id="scoreBox" class="scoreButton">
Score: <span id="score">0</span>
</button>

<div id="gameButtons">

<button class="restartBtn" onclick="restartGame()">Restart</button>
<button class="backBtn" onclick="goBack()">Back</button>

</div>

<script>

let score=0
let level=""
let first=null
let second=null
let lock=false
let matches=0

let emojis=["🐵","🍌","🐒","🌴","🥥","🍍","🐯","🦁","🐸","🐼","🐨","🐰","🐻","🐧","🦊"]

let player=localStorage.getItem("currentPlayer")

document.getElementById("welcomeText").innerHTML="👋 Welcome <span>"+player+"</span>"

document.getElementById("scoreBox").style.display="none"
document.getElementById("gameButtons").style.display="none"

function startGame(lvl){

level=lvl
score=0
matches=0

document.getElementById("score").innerText=score
document.getElementById("scoreBox").style.display="inline-block"
document.getElementById("gameButtons").style.display="block"

document.getElementById("levelBox").style.display="none"
document.getElementById("welcomeText").style.display="none"

document.getElementById("levelTitle").innerText="LEVEL : "+lvl.toUpperCase()

let board=document.getElementById("gameBoard")
board.innerHTML=""

if(lvl=="easy") board.style.gridTemplateColumns="repeat(4,80px)"
if(lvl=="intermediate") board.style.gridTemplateColumns="repeat(5,80px)"
if(lvl=="hard") board.style.gridTemplateColumns="repeat(6,80px)"

let pairs

if(lvl=="easy") pairs=8
if(lvl=="intermediate") pairs=10
if(lvl=="hard") pairs=15

let cards=emojis.slice(0,pairs)
cards=[...cards,...cards]
cards.sort(()=>0.5-Math.random())

cards.forEach(symbol=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`
<div class="card-inner">
<div class="card-front">?</div>
<div class="card-back">${symbol}</div>
</div>
`

card.dataset.symbol=symbol
card.onclick=()=>flip(card)

board.appendChild(card)

})

}

function flip(card){

if(lock) return
if(card.classList.contains("flip")) return

card.classList.add("flip")

if(!first){
first=card
return
}

second=card
lock=true

if(first.dataset.symbol==second.dataset.symbol){

score+=10
matches++

document.getElementById("score").innerText=score

reset()

if(matches==document.querySelectorAll(".card").length/2){
showWin()
}

}else{

score-=2
if(score<0) score=0

document.getElementById("score").innerText=score

setTimeout(()=>{

first.classList.remove("flip")
second.classList.remove("flip")

reset()

},700)

}

}

function reset(){
first=null
second=null
lock=false
}

function showWin(){

let popup=document.createElement("div")

popup.className="win-popup"

popup.innerHTML=`
<div class="win-box">

🎉 YOU WON! 🎉
<br><br>
Great memory skills!

<br><br>

<button onclick="continueGame()">Continue</button>

</div>
`

document.body.appendChild(popup)

}

function continueGame(){

localStorage.setItem("flipScore",score)
localStorage.setItem("bananaLevel",level)

window.location="banana.html"

}

function startBanana(){

localStorage.setItem("flipScore",score)
localStorage.setItem("bananaLevel",level)

window.location="banana.html"

}

function restartGame(){
startGame(level)
}

function goBack(){
location.reload()
}

function logout(){
window.location="index.html"
}

</script>

</body>
</html>
